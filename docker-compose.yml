version: '3.8'

services:
  mysql_server:
    image: mysql:8.0
    container_name: mysql_v2_shared
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - shared_mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - auth_network
    ports:
      - "3307:3306" # para que no de conflictos con mysql corriendo local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak_v2
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      # Nombres modernos para Keycloak 24+
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Nombres antiguos (por si acaso, para compatibilidad)
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Configuración de DB
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql_server:3306/keycloak
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Saltarse la restricción de "Local access required"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      mysql_server:
        condition: service_healthy
    networks:
      - auth_network

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2_proxy_v2
    restart: always
    ports:
      - "4180:4180"
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_CLIENT_ID=${KC_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${KC_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=false
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      # - OAUTH2_PROXY_UPSTREAM=http://django:8000/
      - OAUTH2_PROXY_UPSTREAMS=http://django:8000/
      # - OAUTH2_PROXY_PROXY_PREFIX=/
      

      - OAUTH2_PROXY_REDIRECT_URL=http://localhost:4180/oauth2/callback

      # URLs de Comunicación (Mantenemos el truco de Localhost vs Keycloak)
      - OAUTH2_PROXY_OIDC_ISSUER_URL=http://keycloak:8080/realms/django-realm  # El Proxy usa esta URL para descargar la configuración (Docker a Docker)
      - OAUTH2_PROXY_LOGIN_URL=http://localhost:8080/realms/django-realm/protocol/openid-connect/auth # Esta es la URL que el Proxy le dirá a TU NAVEGADOR que abra
      - OAUTH2_PROXY_REDEEM_URL=http://keycloak:8080/realms/django-realm/protocol/openid-connect/token # URL interna para validar los tokens (Docker a Docker)
      - OAUTH2_PROXY_OIDC_JWKS_URL=http://keycloak:8080/realms/django-realm/protocol/openid-connect/certs

      # Configuración de Identidad
      - OAUTH2_PROXY_USER_ID_CLAIM=email
      # - OAUTH2_PROXY_USER_ID_CLAIM=preferred_username # Esto hará que X-Forwarded-User envíe django_user en lugar del UUID.

      
      - OAUTH2_PROXY_SCOPE=openid email profile
      - OAUTH2_PROXY_PASS_GROUPS=false # revisar esto
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL=true
      
      # Saltos de validación para desarrollo
      - OAUTH2_PROXY_SKIP_OIDC_DISCOVERY=true  # configuracion manual
      # SALTAR LA DISCOVERY PARA USAR LAS URLS DIRECTAS
      # El LOGIN_URL, REDEEM_URL, JWKS_URL se fija directamente, sin depender de la discovery
      # El proxy NO descubre automáticamente endpoints de Keycloak
      - OAUTH2_PROXY_SKIP_OIDC_USER_INFO=true
      - OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION=true
      - OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY=true
      
      # Cabeceras para Django
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_SET_XAUTHUSER=true
      - OAUTH2_PROXY_PASS_USER_HEADERS=true
      - OAUTH2_PROXY_PASS_HOST_HEADER=true

    depends_on:
      - keycloak
      - django
    networks:
      - auth_network

  django:
    build: .
    container_name: django_app_v2
    hostname: django # <--- Añade esto para asegurar el DNS interno
    ports:
    - "8000:8000"
    volumes:
      - .:/code  # <--- CAMBIO CLAVE: Punto en lugar de ./core
    command: >
      sh -c "echo 'Esperando MySQL...' && 
             while ! nc -z mysql_server 3306; do sleep 1; done && 
             python manage.py migrate --noinput && 
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DATABASE_URL=mysql://${DJANGO_DB_USER}:${DJANGO_DB_PASSWORD}@mysql_server:3306/django_db
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      mysql_server:
        condition: service_healthy
    networks:
      - auth_network

volumes:
  shared_mysql_data:

networks:
  auth_network:
    driver: bridge